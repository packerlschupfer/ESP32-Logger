[platformio]
default_envs = without_logger, with_logger

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = 
    symlink://../..  ; Logger library

; C++11 standard (no C++17 features)
build_flags = -std=c++11
    -Werror=unused-result

[env:without_logger]
; No USE_CUSTOM_LOGGER defined - uses ESP-IDF directly

[env:with_logger]
build_flags = 
    -Werror=unused-result
    -std=c++11
    -DUSE_CUSTOM_LOGGER
[env:esp32dev]
extends = env:without_logger
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip