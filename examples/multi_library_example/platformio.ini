[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; This example bundles header-only helper "libraries" under lib/ (SensorLibrary,
; NetworkLibrary, StorageLibrary). They previously resolved only as a side effect of
; copying the whole repo onto the include path; with a clean symlink dep they must be
; put on the include path explicitly.
build_flags =
    -DUSE_CUSTOM_LOGGER
    -Ilib/SensorLibrary
    -Ilib/NetworkLibrary
    -Ilib/StorageLibrary

lib_deps =
    symlink://../..  ; Logger library (relative path)
