[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Enable custom logger for all libraries
build_flags = -DUSE_CUSTOM_LOGGER

; This example bundles header-only helper libs under lib/ (SensorLibrary, etc.).
; deep+ makes the dependency finder scan them; chain mode misses header-only libs.
lib_ldf_mode = deep+

lib_deps =
    symlink://../..  ; Logger library (relative path)